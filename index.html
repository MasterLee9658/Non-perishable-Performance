<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Analytics | Executive View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        /* Professional Card Grid System */
        .card-pro {
            @apply bg-white rounded-[32px] p-6 shadow-sm border border-slate-100 flex flex-col justify-between transition-all hover:shadow-md h-full;
        }

        /* Color Variations from Reference */
        .card-navy { @apply bg-[#111827] text-white border-none shadow-xl shadow-slate-200; }
        .card-emerald { @apply bg-[#059669] text-white border-none; }
        .card-orange { @apply bg-[#ea580c] text-white border-none; }
        .card-outline-orange { @apply border-2 border-[#ea580c] bg-white; }

        /* Typography */
        .label-tiny { @apply text-[10px] font-800 uppercase tracking-widest mb-3 block; }
        .val-hero { @apply text-5xl font-800 tracking-tight; }
        .val-sub { @apply text-3xl font-800 tracking-tight; }

        /* Small Badge Boxes (FTA/Retention) */
        .mini-box {
            @apply rounded-xl p-3 flex flex-col items-center justify-center min-w-[75px] text-center;
        }
        .mini-box-label { @apply text-[9px] font-800 uppercase tracking-tighter mb-1; }
        .mini-box-val { @apply text-sm font-800; }

        /* Custom Filter Styling */
        .filter-select {
            @apply bg-white border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold text-slate-600 outline-none cursor-pointer hover:border-slate-400 transition-all;
        }

        .chart-panel {
            @apply bg-white p-8 rounded-[40px] border border-slate-100 shadow-sm;
        }

        .loader {
            border: 2px solid #e2e8f0; border-top: 2px solid #6366f1; border-radius: 50%;
            width: 16px; height: 16px; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-12">
    
    <header class="py-8 px-8 max-w-[1600px] mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="p-3.5 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-800 text-slate-800 tracking-tight">Executive Dashboard</h1>
                    <div class="flex items-center gap-2">
                        <div id="status-spinner" class="loader hidden"></div>
                        <span id="data-status" class="text-[9px] font-800 text-slate-400 uppercase tracking-widest">Live Sync Enabled</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-2">
                <select id="monthFilter" class="filter-select" onchange="applyFilters()"><option value="All">All Months</option></select>
                <select id="categoryFilter" class="filter-select" onchange="applyFilters()"><option value="All">All Categories</option></select>
                <select id="regionFilter" class="filter-select" onchange="applyFilters()"><option value="All">Supply Owner</option></select>
                <select id="abmFilter" class="filter-select" onchange="applyFilters()"><option value="All">ABM</option></select>
                <button onclick="fetchData()" class="ml-2 bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-xl transition-all active:scale-95 text-xs font-bold">Sync Data</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-8">
        
        <!-- ROW 1: TRADE STATUS (Matches your reference image layout) -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-5 mb-5">
            <!-- Total No. Trades (Solid Navy) -->
            <div class="card-pro card-navy">
                <span class="label-tiny text-slate-400">Total No. Trades</span>
                <span id="stat-total" class="val-hero">0</span>
            </div>
            
            <!-- Executed (Small White Box with Grey Label) -->
            <div class="card-pro">
                <span class="label-tiny text-slate-400">Executed</span>
                <span id="stat-executed" class="val-sub text-slate-800">0</span>
            </div>
            
            <!-- Confirmed (Small White Box with Blue Label) -->
            <div class="card-pro">
                <span class="label-tiny text-blue-500">Confirmed</span>
                <span id="stat-confirmed" class="val-sub text-blue-600">0</span>
            </div>
            
            <!-- Closed (Small White Box with Green Label) -->
            <div class="card-pro">
                <span class="label-tiny text-emerald-500">Closed</span>
                <span id="stat-closed-count" class="val-sub text-emerald-600">0</span>
            </div>
            
            <!-- Open Trades (Outline Orange) -->
            <div class="card-pro card-outline-orange">
                <span class="label-tiny text-[#ea580c]">Open Trades</span>
                <span id="stat-open" class="val-sub text-[#ea580c]">0</span>
            </div>
        </div>

        <!-- ROW 2: NETWORK & REVENUE -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-5 mb-8">
            <!-- Active Buyers with FTA/Retention Mini-Boxes -->
            <div class="card-pro">
                <span class="label-tiny text-blue-600">Active Buyers</span>
                <span id="stat-buyers" class="val-hero text-blue-700 mb-6">0</span>
                <div class="flex gap-2">
                    <div class="mini-box bg-orange-50 text-orange-600">
                        <span class="mini-box-label opacity-60">FTA</span>
                        <span id="stat-fta" class="mini-box-val">0</span>
                    </div>
                    <div class="mini-box bg-blue-50 text-blue-600">
                        <span class="mini-box-label opacity-60">Retention</span>
                        <span id="stat-retention" class="mini-box-val">0</span>
                    </div>
                </div>
            </div>

            <!-- Sellers -->
            <div class="card-pro">
                <span class="label-tiny text-purple-600">Sellers</span>
                <span id="stat-sellers" class="val-hero text-purple-700">0</span>
            </div>

            <!-- Closed GMV (Navy) -->
            <div class="card-pro card-navy">
                <span class="label-tiny text-slate-400">Closed GMV</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-800 opacity-60">₹</span>
                    <span id="stat-gmv" class="val-sub">0</span>
                </div>
            </div>

            <!-- Margin (Emerald) -->
            <div class="card-pro card-emerald">
                <span class="label-tiny opacity-70">Margin</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-800 opacity-60">₹</span>
                    <span id="stat-margin" class="val-sub">0</span>
                </div>
            </div>

            <!-- Pot Add Margin (Orange) -->
            <div class="card-pro card-orange">
                <span class="label-tiny opacity-70">Pot. Add. Margin</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-800 opacity-60">₹</span>
                    <span id="stat-pot-margin" class="val-sub">0</span>
                </div>
            </div>
        </div>

        <!-- ROW 3: CHARTS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="chart-panel">
                <h3 class="text-[11px] font-800 text-slate-400 uppercase tracking-widest mb-8">Revenue Momentum</h3>
                <div class="h-[300px]"><canvas id="chartGmv"></canvas></div>
            </div>
            
            <div class="chart-panel">
                <h3 class="text-[11px] font-800 text-slate-400 uppercase tracking-widest mb-8">Margin Trend (Lakhs)</h3>
                <div class="h-[300px]"><canvas id="chartMargin"></canvas></div>
            </div>

            <div class="chart-panel">
                <h3 class="text-[11px] font-800 text-slate-400 uppercase tracking-widest mb-8">Buyer Retention</h3>
                <div class="h-[300px]"><canvas id="chartUserTrend"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        Chart.register(ChartDataLabels);

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyVz_AMFqUPAk7w8-jSo1c0u1E8J-NGAecbFB17ZwZtnXbc2MC4QUqVehkOQBVSwKSRnShOsIna5rl/pub?output=csv';
        
        const COLS = {
            MONTH: 'GMV Month',
            WEEK: 'Trade Week',
            CATEGORY: 'SKU Category',
            REGION: 'Supply Owner', 
            ABM: 'Supply Owner_2',   
            USER: 'buyer_id',
            SELLER: 'seller_id',
            GMV: 'Sale value( Contract/GMV)', 
            MARGIN: 'Trade Margin',
            STATUS: 'Trade Status'
        };

        const MONTH_ORDER = ["March", "April", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan_26", "Feb_26", "Mar_26", "Apr_26"];

        let rawData = [];
        let charts = {};

        const cleanNum = (val) => {
            if (!val) return 0;
            return parseFloat(String(val).replace(/[^\d.-]/g, '')) || 0;
        };

        async function fetchData() {
            document.getElementById('status-spinner').classList.remove('hidden');
            Papa.parse(SHEET_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    rawData = results.data.filter(r => r[COLS.MONTH]);
                    populateFilterOptions();
                    applyFilters();
                    document.getElementById('status-spinner').classList.add('hidden');
                    document.getElementById('data-status').innerText = `Synced: ${new Date().toLocaleTimeString()}`;
                }
            });
        }

        function populateFilterOptions() {
            const getSet = (col) => [...new Set(rawData.map(r => r[col]))].filter(Boolean).sort();
            const mSet = [...new Set(rawData.map(r => r[COLS.MONTH]))].filter(Boolean).sort((a,b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));
            
            const fill = (id, items, label) => {
                const el = document.getElementById(id);
                el.innerHTML = `<option value="All">All ${label}</option>` + items.map(i => `<option value="${i}">${i}</option>`).join('');
            };

            fill('monthFilter', mSet, 'Months');
            fill('categoryFilter', getSet(COLS.CATEGORY), 'Categories');
            fill('regionFilter', getSet(COLS.REGION), 'Regions');
            fill('abmFilter', getSet(COLS.ABM), 'ABMs');
        }

        function applyFilters() {
            const f = {
                m: document.getElementById('monthFilter').value,
                c: document.getElementById('categoryFilter').value,
                r: document.getElementById('regionFilter').value,
                a: document.getElementById('abmFilter').value
            };

            let filtered = rawData;
            if (f.m !== 'All') filtered = filtered.filter(r => r[COLS.MONTH] === f.m);
            if (f.c !== 'All') filtered = filtered.filter(r => r[COLS.CATEGORY] === f.c);
            if (f.r !== 'All') filtered = filtered.filter(r => r[COLS.REGION] === f.r);
            if (f.a !== 'All') filtered = filtered.filter(r => r[COLS.ABM] === f.a);

            renderDashboard(filtered, f.m === 'All');
        }

        function renderDashboard(data, isMonthly) {
            const closed = data.filter(r => (r[COLS.STATUS]||'').toLowerCase().trim() === 'closed');
            const executed = data.filter(r => (r[COLS.STATUS]||'').toLowerCase().trim() === 'executed');
            const confirmed = data.filter(r => (r[COLS.STATUS]||'').toLowerCase().trim() === 'confirmed');
            const open = data.filter(r => (r[COLS.STATUS]||'').toLowerCase().trim() !== 'closed');
            
            const gmv = closed.reduce((acc, r) => acc + cleanNum(r[COLS.GMV]), 0);
            const margin = closed.reduce((acc, r) => acc + cleanNum(r[COLS.MARGIN]), 0);
            const pot = open.reduce((acc, r) => acc + cleanNum(r[COLS.MARGIN]), 0);

            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-executed').innerText = executed.length;
            document.getElementById('stat-confirmed').innerText = confirmed.length;
            document.getElementById('stat-closed-count').innerText = closed.length;
            document.getElementById('stat-open').innerText = open.length;
            
            const uniqueBuyers = new Set(closed.map(r => r[COLS.USER]));
            document.getElementById('stat-buyers').innerText = uniqueBuyers.size;
            document.getElementById('stat-sellers').innerText = new Set(data.map(r => r[COLS.SELLER])).size;
            
            // For demo: Retention = all active buyers, FTA = 0 (Calculated from first trade status in production)
            document.getElementById('stat-retention').innerText = uniqueBuyers.size;
            document.getElementById('stat-fta').innerText = 0; 

            const nf = new Intl.NumberFormat('en-IN');
            document.getElementById('stat-gmv').innerText = nf.format(Math.round(gmv));
            document.getElementById('stat-margin').innerText = nf.format(Math.round(margin));
            document.getElementById('stat-pot-margin').innerText = nf.format(Math.round(pot));

            const groupKey = isMonthly ? COLS.MONTH : COLS.WEEK;
            const trend = {};
            data.forEach(r => {
                const k = r[groupKey] || 'N/A';
                if (!trend[k]) trend[k] = { gmv: 0, margin: 0, users: new Set() };
                if ((r[COLS.STATUS]||'').toLowerCase().trim() === 'closed') {
                    trend[k].gmv += (cleanNum(r[COLS.GMV])/100000);
                    trend[k].margin += (cleanNum(r[COLS.MARGIN])/100000);
                    trend[k].users.add(r[COLS.USER]);
                }
            });

            let labs = Object.keys(trend);
            if (isMonthly) labs.sort((a,b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));
            else labs.sort((a,b) => (parseInt(a.match(/\d+/))||0) - (parseInt(b.match(/\d+/))||0));

            updateChart('chartGmv', labs, labs.map(l => trend[l].gmv), '#334155', 1);
            updateChart('chartMargin', labs, labs.map(l => trend[l].margin), '#10b981', 1);
            updateChart('chartUserTrend', labs, labs.map(l => trend[l].users.size), '#6366f1', 0);
        }

        function updateChart(id, labs, vals, col, prec) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: labs,
                    datasets: [{ data: vals, backgroundColor: col, borderRadius: 6, maxBarThickness: 32 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end', align: 'top', offset: 0,
                            formatter: v => v === 0 ? '' : v.toFixed(prec),
                            font: { weight: '800', size: 10, family: 'Plus Jakarta Sans' },
                            color: '#64748b'
                        }
                    },
                    scales: {
                        y: { display: false, beginAtZero: true },
                        x: { grid: { display: false }, border: { display: false }, ticks: { font: { weight: '700', size: 10 }, color: '#94a3b8' } }
                    }
                }
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
